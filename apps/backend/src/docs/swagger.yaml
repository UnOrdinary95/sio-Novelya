  /users/{id}/cart:
   patch:
     summary: Mettre à jour le panier d'un utilisateur
     description: |
       Ajoute ou retire une quantité d'un light novel dans le panier d'un utilisateur.
       
       - Si `quantity` est positif, ajoute au panier.
       - Si `quantity` est négatif, retire du panier.
       - Si la quantité finale atteint 0 ou moins, l'article est supprimé du panier.
       
       **🔒 Accès restreint : seul l'utilisateur lui-même peut modifier son panier (l'administrateur ne peut pas).**
     tags:
       - Users
     security:
       - CookieAuth: []
     parameters:
       - name: id
         in: path
         required: true
         description: ID de l'utilisateur
         schema:
           type: string
           pattern: "^[0-9a-fA-F]{24}$"
           example: "507f1f77bcf86cd799439011"
     requestBody:
       required: true
       content:
         application/json:
           schema:
             type: object
             properties:
               lightNovelId:
                 type: string
                 description: ID du light novel à ajouter/modifier dans le panier
                 example: "507f1f77bcf86cd799439011"
               quantity:
                 type: integer
                 description: Quantité à ajouter (positif) ou retirer (négatif)
                 example: 2
             required:
               - lightNovelId
               - quantity
           example:
             lightNovelId: "507f1f77bcf86cd799439011"
             quantity: 2
     responses:
       "200":
         description: Panier mis à jour avec succès
         content:
           application/json:
             schema:
               type: object
               properties:
                 message:
                   type: string
                   example: "Panier mis à jour avec succès"
       "401":
         description: Token manquant, mal formé, invalide ou expiré
         content:
           application/json:
             schema:

services:
    db:
        image: mongo:8
        container_name: novelya-mongodb
        ports:
            - '${MONGO_PORT:-27017}:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
            MONGO_INITDB_DATABASE: ${MONGO_DB}
        volumes:
            - mongodb_data:/data/db
            - ./docker/jeu-essai/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
            - ./docker/jeu-essai/novelya:/docker-entrypoint-initdb.d/novelya:ro
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    mongodb_data:
